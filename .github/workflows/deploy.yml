name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and copy to repository root
        run: npm run build

      - name: Commit deployment artifacts
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: ビルド成果物を GitHub Pages 用にデプロイ
          file_pattern: |
            index.html
            assets/**
            icons/**
            registerSW.js
            sw.js
            workbox-*.js
            manifest.webmanifest
            thumbnail.png
            .nojekyll
          skip_fetch: false
